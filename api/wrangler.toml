name = "agent-bench-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
LEADERBOARD_URL = "https://bench.rapid42.com/leaderboard"

[[d1_databases]]
binding = "DB"
database_name = "agent-bench"
database_id = "4232bde5-fc38-4294-a49d-0e27206cfb74"

[env.production]
routes = [
  { pattern = "bench.rapid42.com/api/*", zone_name = "rapid42.com" }
]
